  # Please see the documentation for all configuration options:
  # https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

  # yaml-language-server: $schema=https://json.schemastore.org/dependabot-2.0.json

version: 2
updates:

  - package-ecosystem: "npm"
    directory: "/"
    assignees:
      - "XFox111"
    schedule:
      interval: monthly
    rebase-strategy: disabled
    groups:
      deps:
        patterns:
          - "*"
        exclude-patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - minor
          - patch
      react-next:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - major

  - package-ecosystem: "github-actions"
    directory: "/"
    assignees:
      - "XFox111"
    schedule:
      interval: monthly
    rebase-strategy: disabled
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "devcontainers"
    directory: "/"
    assignees:
      - "XFox111"
    schedule:
      interval: monthly
    rebase-strategy: disabled
    groups:
      devcontainers:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    assignees:
      - "XFox111"
    schedule:
      interval: monthly
    rebase-strategy: disabled
    groups:
      docker:
        patterns:
          - "*"
